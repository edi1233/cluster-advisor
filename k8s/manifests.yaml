apiVersion: v1
kind: Namespace
metadata:
  name: k8s-ai-ops
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-ops-reader
rules:
  # Read-only across every API group/resource (built-ins + CRDs) so the portal's
  # live discovery can browse anything installed on the cluster. get/list/watch
  # only -- no create/update/patch/delete/exec. Secret values are separately
  # redacted at the app layer regardless of this RBAC scope.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-ops-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ai-ops-reader
subjects:
  - kind: ServiceAccount
    name: k8s-ai-ops
    namespace: k8s-ai-ops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-ai-ops-deepdive
  namespace: k8s-ai-ops
data:
  report.json: |
    {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-ai-ops-companion-answers
  namespace: k8s-ai-ops
data:
  answers.json: |
    {}
---
apiVersion: v1
kind: Secret
metadata:
  name: k8s-ai-ops-portal-auth
  namespace: k8s-ai-ops
type: Opaque
stringData:
  PORTAL_USER: admin
  PORTAL_PASSWORD: "xLyFYSOQ9xFrlxXtIvk6Sg"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-ai-ops-data
  namespace: k8s-ai-ops
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
  labels:
    app.kubernetes.io/name: k8s-ai-ops
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ai-ops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ai-ops
    spec:
      serviceAccountName: k8s-ai-ops
      containers:
        - name: app
          image: harbor.edi-it.com/airuneers/k8s-ai-ops:v5
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: REFRESH_SECONDS
              value: "120"
            - name: DB_PATH
              value: "/data/db/app.db"
          envFrom:
            - secretRef:
                name: k8s-ai-ops-portal-auth
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
          volumeMounts:
            - name: deepdive
              mountPath: /data/deepdive
            - name: companion-answers
              mountPath: /data/companion-answers
            - name: data
              mountPath: /data/db
      volumes:
        - name: deepdive
          configMap:
            name: k8s-ai-ops-deepdive
        - name: companion-answers
          configMap:
            name: k8s-ai-ops-companion-answers
        - name: data
          persistentVolumeClaim:
            claimName: k8s-ai-ops-data
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
spec:
  selector:
    app.kubernetes.io/name: k8s-ai-ops
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
  labels:
    app.kubernetes.io/name: k8s-ai-ops
spec:
  hostnames:
    - cluster-advisor.edi-it.com
  parentRefs:
    - name: public-gateway
      namespace: envoy-gateway-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: k8s-ai-ops
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-ai-ops-http-redirect
  namespace: k8s-ai-ops
  labels:
    app.kubernetes.io/name: k8s-ai-ops
spec:
  hostnames:
    - cluster-advisor.edi-it.com
  parentRefs:
    - name: public-gateway
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
