apiVersion: v1
kind: Namespace
metadata:
  name: k8s-ai-ops
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-ops-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "events", "namespaces", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-ops-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ai-ops-reader
subjects:
  - kind: ServiceAccount
    name: k8s-ai-ops
    namespace: k8s-ai-ops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-ai-ops-deepdive
  namespace: k8s-ai-ops
data:
  report.json: |
    {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
  labels:
    app.kubernetes.io/name: k8s-ai-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ai-ops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ai-ops
    spec:
      serviceAccountName: k8s-ai-ops
      containers:
        - name: app
          image: harbor.edi-it.com/airuneers/k8s-ai-ops:latest
          ports:
            - containerPort: 8000
          env:
            - name: REFRESH_SECONDS
              value: "120"
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
          volumeMounts:
            - name: deepdive
              mountPath: /data/deepdive
      volumes:
        - name: deepdive
          configMap:
            name: k8s-ai-ops-deepdive
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
spec:
  selector:
    app.kubernetes.io/name: k8s-ai-ops
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-ai-ops
  namespace: k8s-ai-ops
  labels:
    app.kubernetes.io/name: k8s-ai-ops
spec:
  hostnames:
    - cluster-advisor.edi-it.com
  parentRefs:
    - name: public-gateway
      namespace: envoy-gateway-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: k8s-ai-ops
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-ai-ops-http-redirect
  namespace: k8s-ai-ops
  labels:
    app.kubernetes.io/name: k8s-ai-ops
spec:
  hostnames:
    - cluster-advisor.edi-it.com
  parentRefs:
    - name: public-gateway
      namespace: envoy-gateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
